// ========== 工具函数 ==========
function showToast(type, title, msg) {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toast-icon');
  const configs = { success:{bg:'bg-green-100',color:'text-green-600',icon:'fa-check-circle'}, error:{bg:'bg-red-100',color:'text-red-600',icon:'fa-times-circle'}, warning:{bg:'bg-orange-100',color:'text-orange-600',icon:'fa-exclamation-circle'}, info:{bg:'bg-brand-100',color:'text-brand-600',icon:'fa-info-circle'} };
  const c = configs[type] || configs.info;
  icon.className = `w-10 h-10 rounded-xl flex items-center justify-center ${c.bg} ${c.color}`;
  icon.innerHTML = `<i class="fas ${c.icon}"></i>`;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.remove('translate-x-full');
  setTimeout(() => toast.classList.add('translate-x-full'), 3000);
}

function hideToast() { document.getElementById('toast').classList.add('translate-x-full'); }

function formatDate() {
  const now = new Date(), days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  return `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
}

function formatTime() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function updateDateTime() {
  document.getElementById('currentDate').textContent = formatDate();
  document.getElementById('currentTime').textContent = formatTime();
}

function getStatusBadge(status) {
  const m = { pending:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700">未开始</span>', producing:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-brand-100 text-brand-700">进行中</span>', delayed:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700">已延期</span>', shipped:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700">已出货</span>', completed:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700">已完成</span>', in_progress:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-brand-100 text-brand-700">进行中</span>', purchasing:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-brand-100 text-brand-700">采购中</span>', received:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700">已入库</span>', approved:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700">已批准</span>', pending_approval:'<span class="px-2.5 py-1 rounded-full text-xs font-medium bg-orange-100 text-orange-700">待审批</span>' };
  return m[status] || m.pending;
}

  });
  
  nav.innerHTML += '<div class="px-3 mb-2 mt-6 text-xs font-semibold text-gray-400 uppercase">智能决策</div>';
  
  ['ai','alerts'].forEach(id => {
    const item = navConfig.find(n => n.id === id);
    if (!hasPermission(id)) return;
    const tag = item.tag ? `<span class="ml-auto text-xs bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full">${item.tag}</span>` : '';
    nav.innerHTML += `<a href="#" onclick="switchTab('${id}')" id="nav-${id}" class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700">

  });
  
  nav.innerHTML += '<div class="px-3 mb-2 mt-6 text-xs font-semibold text-gray-400 uppercase">系统管理</div>';
  
  ['settings','users'].forEach(id => {
    const item = navConfig.find(n => n.id === id);
    if (!hasPermission(id)) return;
    nav.innerHTML += `<a href="#" onclick="switchTab('${id}')" id="nav-${id}" class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700">
      <i class="fas ${item.icon} w-5 text-center ${item.color}"></i><span>${item.label}</span></a>`;
  });
}

function hasPermission(tabId) {
  if (!currentUser) return false;
  return currentUser.permissions.includes('*') || currentUser.permissions.includes(tabId);
}

function updateBadges() {
  const count = mockData.approvals.filter(a => a.status === 'pending').length;
  document.getElementById('approvalBadge').textContent = count;
  document.getElementById('approvalBadge').style.display = count > 0 ? 'flex' : 'none';
}

// ========== 标签页 ==========
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + tab);
  if (nav) nav.classList.add('active');
  const content = document.getElementById('mainContent');
  const renders = { dashboard:renderDashboard, orders:renderOrders, production:renderProduction, inventory:renderInventory, approvals:renderApprovals, alerts:renderAlerts, ai:renderAI, settings:renderSettings, users:renderUsers };
  content.innerHTML = renders[tab] ? renders[tab]() : renders.dashboard();
  if (tab === 'dashboard') initCharts();
}
