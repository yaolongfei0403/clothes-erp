<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI漫剧 - 资产库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans SC', 'sans-serif'] },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                        cyan: '#06b6d4',
                        emerald: '#10b981',
                        amber: '#f59e0b',
                        rose: '#f43f5e',
                        dark: '#0f172a',
                        darker: '#020617',
                        surface: '#1e293b',
                        'surface-light': '#334155',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --emerald: #10b981;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --rose: #f43f5e;
            --dark: #0f172a;
            --darker: #020617;
            --surface: #1e293b;
            --surface-light: #334155;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: #020617;
            color: #e2e8f0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-panel-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .asset-card {
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .asset-card:hover {
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .asset-card.selected {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), 0 8px 25px rgba(0, 0, 0, 0.35);
        }
        .fade-in { animation: fadeIn 0.45s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-overlay {
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            animation: modalSlideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .checkbox-custom {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            flex-shrink: 0;
        }
        .checkbox-custom:checked {
            background: #6366f1;
            border-color: #6366f1;
        }
        .checkbox-custom:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .glow-ring { box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.3), 0 0 30px rgba(99, 102, 241, 0.1); }
        .glow-ring-emerald { box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.3), 0 0 30px rgba(16, 185, 129, 0.1); }
        .category-tab {
            transition: all 0.25s ease;
        }
        .category-tab:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .category-tab.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            color: #a5b4fc;
        }
        .project-badge {
            transition: all 0.2s ease;
        }
        .project-badge:hover {
            filter: brightness(1.1);
        }
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }
        .toast {
            animation: toastSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .tag-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.6875rem;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-darker">

    <!-- 顶部导航 -->
    <header class="h-16 glass-panel-strong border-b border-white/5 flex items-center justify-between px-5 md:px-6 z-50 relative sticky top-0">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/30 flex-shrink-0">
                <i class="fas fa-film text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-base md:text-lg font-bold text-white tracking-tight">AI漫剧生成工作台</h1>
                <p class="text-xs text-slate-400 hidden sm:block">资产库管理</p>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-3">
            <button class="w-9 h-9 rounded-lg bg-surface border border-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:border-white/15 transition-all flex-shrink-0">
                <i class="fas fa-upload"></i>
            </button>
            <button class="w-9 h-9 rounded-lg bg-surface border border-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:border-white/15 transition-all flex-shrink-0">
                <i class="fas fa-cog"></i>
            </button>
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold text-sm flex-shrink-0 shadow-lg shadow-primary/25">A</div>
        </div>
    </header>

    <!-- 导航链接 -->
    <nav class="hidden md:flex items-center gap-1 px-5 md:px-6 py-2 border-b border-white/5 bg-surface/30">
        <a href="项目列表.html" class="px-2.5 py-1 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 text-[11px] font-medium transition-all">
            <i class="fas fa-folder mr-1"></i>项目
        </a>
        <a href="创建项目.html" class="px-2.5 py-1 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 text-[11px] font-medium transition-all">
            <i class="fas fa-plus mr-1"></i>创建
        </a>
        <a href="小说上传-分集与资产提取.html" class="px-2.5 py-1 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 text-[11px] font-medium transition-all">
            <i class="fas fa-upload mr-1"></i>小说上传
        </a>
        <a href="资产库.html" class="px-2.5 py-1 rounded-lg bg-primary/15 text-primary border border-primary/25 text-[11px] font-medium">
            <i class="fas fa-boxes-stacked mr-1"></i>资产库
        </a>
        <a href="分镜生视频.html" class="px-2.5 py-1 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 text-[11px] font-medium transition-all">
            <i class="fas fa-video mr-1"></i>视频
        </a>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <!-- 统计概览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
            <!-- 总资产 -->
            <div class="stat-card glass-panel rounded-2xl p-4 md:p-5 cursor-pointer" onclick="filterByProject('all')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary/20 to-secondary/20 border border-primary/20 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-boxes-stacked text-primary text-lg"></i>
                    </div>
                    <div>
                        <div class="text-2xl md:text-3xl font-bold text-white">47</div>
                        <div class="text-xs text-slate-400">资产总数</div>
                    </div>
                </div>
            </div>
            <!-- 角色 -->
            <div class="stat-card glass-panel rounded-2xl p-4 md:p-5 cursor-pointer" onclick="switchCategory('character')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-primary/15 border border-primary/20 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-user text-primary text-lg"></i>
                    </div>
                    <div>
                        <div class="text-2xl md:text-3xl font-bold text-white" id="char-count">12</div>
                        <div class="text-xs text-slate-400">角色</div>
                    </div>
                </div>
            </div>
            <!-- 场景 -->
            <div class="stat-card glass-panel rounded-2xl p-4 md:p-5 cursor-pointer" onclick="switchCategory('scene')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-cyan/15 border border-cyan/20 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-image text-cyan text-lg"></i>
                    </div>
                    <div>
                        <div class="text-2xl md:text-3xl font-bold text-white" id="scene-count">23</div>
                        <div class="text-xs text-slate-400">场景</div>
                    </div>
                </div>
            </div>
            <!-- 道具 -->
            <div class="stat-card glass-panel rounded-2xl p-4 md:p-5 cursor-pointer" onclick="switchCategory('prop')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-amber/15 border border-amber/20 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-cube text-amber text-lg"></i>
                    </div>
                    <div>
                        <div class="text-2xl md:text-3xl font-bold text-white" id="prop-count">12</div>
                        <div class="text-xs text-slate-400">道具</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 筛选工具栏 -->
        <div class="glass-panel rounded-2xl p-4 mb-6">
            <div class="flex flex-col md:flex-row gap-3 md:items-center justify-between">
                <!-- 左侧：分类切换 + 批量选择 -->
                <div class="flex items-center gap-3 flex-wrap">
                    <!-- 分类切换 -->
                    <div class="flex items-center gap-1 p-1 bg-surface/50 rounded-xl border border-white/5">
                        <button onclick="switchCategory('all')" class="category-tab active px-3 py-1.5 rounded-lg text-xs font-medium border border-transparent" data-category="all">
                            <i class="fas fa-border-all mr-1"></i>全部
                        </button>
                        <button onclick="switchCategory('character')" class="category-tab px-3 py-1.5 rounded-lg text-xs font-medium border border-transparent" data-category="character">
                            <i class="fas fa-user mr-1"></i>角色
                        </button>
                        <button onclick="switchCategory('scene')" class="category-tab px-3 py-1.5 rounded-lg text-xs font-medium border border-transparent" data-category="scene">
                            <i class="fas fa-image mr-1"></i>场景
                        </button>
                        <button onclick="switchCategory('prop')" class="category-tab px-3 py-1.5 rounded-lg text-xs font-medium border border-transparent" data-category="prop">
                            <i class="fas fa-cube mr-1"></i>道具
                        </button>
                    </div>

                    <!-- 批量选择 -->
                    <button onclick="toggleSelectMode()" id="select-mode-btn" class="px-3 py-1.5 rounded-lg bg-surface border border-white/10 text-slate-400 hover:text-white text-xs transition-all">
                        <i class="fas fa-check-square mr-1"></i>批量选择
                    </button>

                    <!-- 批量操作（选中后显示） -->
                    <div id="batch-actions" class="hidden items-center gap-2">
                        <span class="text-xs text-slate-400">已选 <span id="selected-count" class="text-primary font-bold">0</span> 个</span>
                        <button onclick="batchDelete()" class="px-3 py-1.5 rounded-lg bg-rose/15 text-rose border border-rose/20 text-xs hover:bg-rose/25 transition-all">
                            <i class="fas fa-trash mr-1"></i>删除
                        </button>
                        <button onclick="batchExport()" class="px-3 py-1.5 rounded-lg bg-emerald/15 text-emerald border border-emerald/20 text-xs hover:bg-emerald/25 transition-all">
                            <i class="fas fa-download mr-1"></i>导出
                        </button>
                        <button onclick="cancelSelect()" class="px-3 py-1.5 rounded-lg bg-surface border border-white/10 text-slate-400 text-xs hover:text-white transition-all">
                            取消
                        </button>
                    </div>
                </div>

                <!-- 右侧：搜索 + 项目筛选 -->
                <div class="flex items-center gap-3 flex-wrap">
                    <!-- 项目筛选 -->
                    <div class="relative">
                        <select id="project-filter" onchange="filterByProject(this.value)" class="appearance-none w-40 px-3 py-2 pr-8 bg-surface/80 border border-white/10 rounded-lg text-sm text-white focus:outline-none focus:border-primary/50 cursor-pointer">
                            <option value="all">全部项目</option>
                            <option value="星辰大海">星辰大海</option>
                            <option value="星际迷航">星际迷航</option>
                            <option value="未来纪元">未来纪元</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                    </div>

                    <!-- 搜索框 -->
                    <div class="relative flex-1 md:flex-none md:w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" id="search-input" oninput="searchAssets(this.value)" placeholder="搜索资产名称..." class="w-full pl-9 pr-4 py-2 bg-surface/80 border border-white/10 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-primary/50 transition-all">
                    </div>

                    <!-- 排序 -->
                    <div class="relative">
                        <select id="sort-select" onchange="sortAssets(this.value)" class="appearance-none w-32 px-3 py-2 pr-8 bg-surface/80 border border-white/10 rounded-lg text-sm text-white focus:outline-none focus:border-primary/50 cursor-pointer">
                            <option value="recent">最近使用</option>
                            <option value="name">名称排序</option>
                            <option value="episodes">按集数</option>
                            <option value="created">创建时间</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 项目标签 -->
        <div class="flex items-center gap-2 mb-4 overflow-x-auto custom-scroll pb-2">
            <span class="text-xs text-slate-500 flex-shrink-0">快速筛选：</span>
            <button onclick="filterByProject('星辰大海')" class="project-badge px-3 py-1 rounded-full bg-primary/15 text-primary border border-primary/25 text-xs whitespace-nowrap hover:bg-primary/25 transition-all">
                星辰大海
            </button>
            <button onclick="filterByProject('星际迷航')" class="project-badge px-3 py-1 rounded-full bg-cyan/15 text-cyan border border-cyan/25 text-xs whitespace-nowrap hover:bg-cyan/25 transition-all">
                星际迷航
            </button>
            <button onclick="filterByProject('未来纪元')" class="project-badge px-3 py-1 rounded-full bg-amber/15 text-amber border border-amber/25 text-xs whitespace-nowrap hover:bg-amber/25 transition-all">
                未来纪元
            </button>
            <button onclick="filterByProject('all')" class="project-badge px-3 py-1 rounded-full bg-surface border border-white/10 text-slate-400 text-xs whitespace-nowrap hover:text-white transition-all">
                查看全部
            </button>
        </div>

        <!-- 资产网格 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4" id="asset-grid">
            <!-- 资产卡片将通过 JS 动态渲染 -->
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden text-center py-16">
            <div class="w-20 h-20 rounded-2xl bg-surface/50 border border-white/5 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-box-open text-slate-600 text-3xl"></i>
            </div>
            <h3 class="text-lg font-semibold text-white mb-2">暂无资产</h3>
            <p class="text-sm text-slate-400 mb-4">从小说中提取角色、场景、道具后会自动出现在这里</p>
            <button onclick="window.location.href='小说上传-分集与资产提取.html'" class="px-5 py-2.5 rounded-xl bg-primary text-white text-sm font-medium hover:bg-primary/80 transition-all">
                <i class="fas fa-plus mr-2"></i>上传小说提取资产
            </button>
        </div>

        <!-- 加载更多 -->
        <div id="load-more" class="text-center py-8">
            <button onclick="loadMoreAssets()" class="px-6 py-2.5 rounded-xl bg-surface border border-white/10 text-slate-400 hover:text-white text-sm transition-all">
                <i class="fas fa-arrow-down mr-2"></i>加载更多
            </button>
        </div>
    </main>

    <!-- 资产详情模态框 -->
    <div id="asset-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden modal-overlay flex items-center justify-center p-4" onclick="closeModal(event)">
        <div class="glass-panel-strong rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden modal-content" onclick="event.stopPropagation()">
            <!-- 模态框头部 -->
            <div class="flex items-center justify-between p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div id="modal-type-icon" class="w-10 h-10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user text-lg"></i>
                    </div>
                    <div>
                        <h3 id="modal-asset-name" class="text-lg font-bold text-white">资产名称</h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="modal-asset-type" class="tag-badge bg-primary/15 text-primary border border-primary/20">角色</span>
                            <span id="modal-asset-subtype" class="tag-badge bg-surface text-slate-400 border border-white/10">主角</span>
                        </div>
                    </div>
                </div>
                <button onclick="closeAssetModal()" class="w-9 h-9 rounded-lg bg-surface border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:border-white/20 transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- 模态框内容 -->
            <div class="p-5 overflow-y-auto custom-scroll max-h-[60vh]">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 左侧：图片预览 -->
                    <div class="space-y-4">
                        <div class="aspect-[4/3] rounded-xl overflow-hidden bg-surface border border-white/10">
                            <img id="modal-asset-img" src="" alt="" class="w-full h-full object-cover">
                        </div>
                        <!-- 缩略图 -->
                        <div class="flex gap-2" id="modal-thumbnails">
                            <div class="w-16 h-16 rounded-lg overflow-hidden border-2 border-primary cursor-pointer">
                                <img src="" alt="" class="w-full h-full object-cover">
                            </div>
                            <div class="w-16 h-16 rounded-lg overflow-hidden border border-white/10 cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
                                <img src="" alt="" class="w-full h-full object-cover">
                            </div>
                            <div class="w-16 h-16 rounded-lg overflow-hidden border border-white/10 cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
                                <img src="" alt="" class="w-full h-full object-cover">
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：详细信息 -->
                    <div class="space-y-4">
                        <!-- 基本信息 -->
                        <div class="p-4 rounded-xl bg-surface/50 border border-white/5">
                            <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">基本信息</h4>
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <span class="text-xs text-slate-500">所属项目</span>
                                    <span id="modal-asset-project" class="text-sm text-white">星辰大海</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-xs text-slate-500">出场集数</span>
                                    <span id="modal-asset-episodes" class="text-sm text-white">12 集</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-xs text-slate-500">创建时间</span>
                                    <span id="modal-asset-created" class="text-sm text-white">2024-01-15</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-xs text-slate-500">使用次数</span>
                                    <span id="modal-asset-usage" class="text-sm text-white">48 次</span>
                                </div>
                            </div>
                        </div>

                        <!-- 生成提示词 -->
                        <div class="p-4 rounded-xl bg-surface/50 border border-white/5">
                            <div class="flex items-center justify-between mb-2">

                    a.prompt.toLowerCase().includes(query)

            document.getElementById('char-count').textContent = characters.length;

            document.getElementById('prop-count').textContent = props.length;

            renderAssets();

                batchActions.classList.add('flex');

                batchActions.classList.remove('flex');
                selectedAssets.clear();

            renderAssets();

            if (selectedAssets.has(id)) {
                selectedAssets.delete(id);

            document.getElementById('selected-count').textContent = selectedAssets.size;
            renderAssets();

            selectMode = false;

            document.getElementById('batch-actions').classList.remove('flex');
            renderAssets();

            if (selectedAssets.size === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedAssets.size} 个资产吗？`)) return;

            // 实际项目中应该调用 API
            selectedAssets.forEach(id => {
                const idx = assetsData.findIndex(a => a.id === id);
                if (idx > -1) assetsData.splice(idx, 1);
            });

            showToast(`已删除 ${selectedAssets.size} 个资产`, 'success');
            cancelSelect();
            renderAssets();

            episodesTags.innerHTML = episodesHtml;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            closeAssetModal();
        }

        function closeAssetModal() {
            document.getElementById('asset-modal').classList.add('hidden');
            document.body.style.overflow = '';
            currentModalAsset = null;
        }

        // 复制提示词
        function copyPrompt() {
            if (!currentModalAsset) return;
            navigator.clipboard.writeText(currentModalAsset.prompt);
            showToast('提示词已复制到剪贴板', 'success');
        }

        // 下载资产
        function downloadAsset() {
            if (!currentModalAsset) return;
            showToast(`正在下载 ${currentModalAsset.name}...`, 'info');
        }

        // 复制资产
        function duplicateAsset() {
            if (!currentModalAsset) return;
            showToast('资产已复制', 'success');
        }

        // 编辑资产
        function editAsset() {
            if (!currentModalAsset) return;
            showToast('打开编辑界面...', 'info');
        }

        // 重新生成
        function regenerateAsset() {
            if (!currentModalAsset) return;
            showToast(`正在重新生成 ${currentModalAsset.name}...`, 'info');
        }

        // 删除资产
        function deleteAssetFromModal() {
            if (!currentModalAsset) return;
            if (!confirm(`确定要删除「${currentModalAsset.name}」吗？`)) return;

            const idx = assetsData.findIndex(a => a.id === currentModalAsset.id);
            if (idx > -1) {
                assetsData.splice(idx, 1);
            }

            closeAssetModal();
            showToast('资产已删除', 'success');
            renderAssets();
        }

        // Toast 提示
        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-emerald',
                error: 'bg-rose',
                info: 'bg-primary',
                warning: 'bg-amber'
            };
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                info: 'info-circle',
                warning: 'exclamation-triangle'
            };

            const toast = document.createElement('div');
            toast.className = `toast fixed bottom-6 right-6 ${colors[type]} text-white px-5 py-3 rounded-xl shadow-2xl z-[100] flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas fa-${icons[type]}"></i>
                <span class="text-sm font-medium">${message}</span>
            `;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ESC 关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAssetModal();
            }
        });
    </script>
</body>
</html>
